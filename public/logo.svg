<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="#0d1117"/>

  <!-- 外圈渐变环 -->
  <circle cx="100" cy="100" r="85" stroke="url(#gradient1)" stroke-width="4" fill="none"/>

  <!-- 六边形外框 -->
  <path d="M100 30 L160 65 L160 135 L100 170 L40 135 L40 65 Z"
        fill="url(#gradient2)"
        stroke="url(#gradient1)"
        stroke-width="3"/>

  <!-- 内部六边形 -->
  <path d="M100 45 L145 70 L145 130 L100 155 L55 130 L55 70 Z"
        fill="url(#gradient3)"
        opacity="0.2"/>

  <!-- "DC" 文字 -->
  <text x="100" y="115"
        font-family="Arial Black, sans-serif"
        font-size="64"
        font-weight="900"
        fill="url(#gradient1)"
        text-anchor="middle"
        letter-spacing="-2">DC</text>

  <!-- 工具图标装饰 - 左上角小扳手 -->
  <path d="M65 55 L75 55 L70 62 Z"
        fill="#10b981"
        opacity="0.6"/>

  <!-- 工具图标装饰 - 右下角小齿轮 -->
  <circle cx="135" cy="140" r="8"
          stroke="#10b981"
          stroke-width="2"
          fill="none"
          opacity="0.6"/>
  <circle cx="135" cy="140" r="3"
          fill="#10b981"
          opacity="0.6"/>

  <!-- 扫描线效果 -->
  <line x1="50" y1="100" x2="150" y2="100"
        stroke="#10b981"
        stroke-width="2"
        opacity="0.4">
    <animate attributeName="y1" values="50;150;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="50;150;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>
