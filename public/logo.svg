<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="#0d1117"/>

  <!-- 外圈渐变环 -->
  <circle cx="100" cy="100" r="85" stroke="url(#gradient1)" stroke-width="4" fill="none"/>

  <!-- 盾牌主体 -->
  <path d="M100 35 L145 55 L145 95 C145 125 125 150 100 165 C75 150 55 125 55 95 L55 55 L100 35Z"
        fill="url(#gradient2)"
        stroke="#10b981"
        stroke-width="3"/>

  <!-- 盾牌内部高光 -->
  <path d="M100 45 L135 62 L135 92 C135 117 118 138 100 150 C82 138 65 117 65 92 L65 62 L100 45Z"
        fill="url(#gradient3)"
        opacity="0.3"/>

  <!-- 对勾标记 -->
  <path d="M85 100 L95 110 L120 80"
        stroke="#10b981"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- 扫描线效果 -->
  <line x1="60" y1="95" x2="140" y2="95"
        stroke="#10b981"
        stroke-width="2"
        opacity="0.6">
    <animate attributeName="y1" values="60;130;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="60;130;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradient3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg>
